name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install poetry
      - run: poetry install
      - run: cd installer/windows && python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: lumen-windows
          path: installer/windows/dist/lumen.exe

  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install poetry
      - run: poetry install
      - run: cd installer/linux && make
      - uses: actions/upload-artifact@v4
        with:
          name: lumen-linux
          path: installer/linux/build/lumen

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            lumen-windows/lumen.exe
            lumen-linux/lumen
